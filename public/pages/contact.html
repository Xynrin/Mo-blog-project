<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 墨 · 创意博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .contact-hero { padding: 8rem 3rem 4rem; background: var(--bg-secondary); text-align: center; }
        .contact-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; margin-bottom: 1rem; }
        .contact-title .accent { color: var(--accent-coral); }
        .contact-subtitle { color: var(--fg-secondary); font-size: 1rem; max-width: 500px; margin: 0 auto; line-height: 1.8; }
        .contact-section { padding: 4rem 3rem; background: var(--bg-primary); }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; max-width: 1000px; margin: 0 auto; }
        .contact-form { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 2rem; }
        .form-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.8rem; color: var(--fg-secondary); margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .form-input, .form-textarea { width: 100%; padding: 1rem; background: var(--bg-input); border: 1px solid var(--border-subtle); color: var(--fg-primary); font-family: var(--font-body); font-size: 0.95rem; transition: var(--transition-fast); }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent-coral); }
        .form-textarea { min-height: 150px; resize: vertical; }
        .form-submit { width: 100%; padding: 1rem; background: var(--accent-coral); color: var(--bg-primary); border: none; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: var(--transition-smooth); }
        .form-submit:hover { background: #d4553f; }
        .form-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .contact-info { display: flex; flex-direction: column; gap: 2rem; }
        .info-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 1.5rem; display: flex; align-items: flex-start; gap: 1rem; transition: var(--transition-smooth); }
        .info-card:hover { border-color: var(--accent-coral); transform: translateX(4px); }
        .info-icon { width: 48px; height: 48px; background: rgba(232, 97, 77, 0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .info-icon svg { width: 24px; height: 24px; stroke: var(--accent-coral); }
        .info-content h4 { font-weight: 700; margin-bottom: 0.3rem; }
        .info-content p { font-size: 0.9rem; color: var(--fg-secondary); }
        .info-content a { color: var(--accent-coral); }
        .success-message { background: rgba(45, 212, 168, 0.1); border: 1px solid var(--accent-teal); color: var(--accent-teal); padding: 1rem; margin-bottom: 1.5rem; text-align: center; display: none; }
        @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="nav" id="navbar">
        <a href="/" class="nav-logo"><span class="dot"></span>墨</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/"><span class="nav-num">01</span>首页</a></li>
            <li><a href="/articles"><span class="nav-num">02</span>文章</a></li>
            <li><a href="/about"><span class="nav-num">03</span>关于我</a></li>
            <li><a href="/portfolio"><span class="nav-num">04</span>作品集</a></li>
            <li><a href="/contact" class="active"><span class="nav-num">05</span>联系我</a></li>
        </ul>
        <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
    </nav>

    <header class="contact-hero">
        <h1 class="contact-title">一起<span class="accent">创造</span>点什么？</h1>
        <p class="contact-subtitle">无论是项目合作、设计咨询，还是单纯想聊聊天，都欢迎联系我。</p>
    </header>

    <section class="contact-section">
        <div class="contact-grid">
            <div class="contact-form">
                <h3 class="form-title">发送消息</h3>
                <div class="success-message" id="successMsg">消息已发送，感谢您的联系！</div>
                <form id="contactForm">
                    <div class="form-group">
                        <label class="form-label">您的姓名</label>
                        <input type="text" class="form-input" id="name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">电子邮箱</label>
                        <input type="email" class="form-input" id="email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">消息内容</label>
                        <textarea class="form-textarea" id="message" required></textarea>
                    </div>
                    <button type="submit" class="form-submit" id="submitBtn">发送消息</button>
                </form>
            </div>

            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <div class="info-content">
                        <h4>电子邮件</h4>
                        <p><a href="mailto:hello@mo-blog.com">hello@mo-blog.com</a></p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <div class="info-content">
                        <h4>所在地</h4>
                        <p>中国 · 远程办公</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </div>
                    <div class="info-content">
                        <h4>响应时间</h4>
                        <p>通常在 24 小时内回复</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                        </svg>
                    </div>
                    <div class="info-content">
                        <h4>社交媒体</h4>
                        <p>Twitter / GitHub / Dribbble</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <span>© 2026 墨 · Mo — 以文字记录灵感</span>
        <div class="footer-links"><a href="#">RSS</a></div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '发送中...';
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };
            
            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (result.success) {
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('contactForm').reset();
                    setTimeout(() => {
                        document.getElementById('successMsg').style.display = 'none';
                    }, 5000);
                } else {
                    alert(result.message || '发送失败，请稍后重试');
                }
            } catch (error) {
                alert('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '发送消息';
            }
        });
    </script>
</body>
</html>
