<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 墨 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-sidebar-header">
                <a href="/admin" class="admin-sidebar-logo">
                    <span class="dot"></span>
                    墨
                    <span class="text">管理后台</span>
                </a>
            </div>
            
            <nav class="admin-sidebar-nav">
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">概览</div>
                    <a href="/admin" class="admin-nav-item active">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        仪表盘
                    </a>
                </div>
                
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">内容</div>
                    <a href="/admin/articles" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        文章管理
                        <span class="badge" id="articleCount">0</span>
                    </a>
                    <a href="/admin/categories" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        分类管理
                    </a>
                    <a href="/admin/portfolios" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        作品集
                    </a>
                    <a href="/admin/media" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        媒体库
                    </a>
                    <a href="/admin/messages" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        消息管理
                    </a>
                </div>
                
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">系统</div>
                    <a href="/admin/settings" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        系统设置
                    </a>
                </div>
            </nav>
            
            <div class="admin-sidebar-footer">
                <div class="admin-user">
                    <div class="admin-user-avatar" id="userAvatar">M</div>
                    <div class="admin-user-info">
                        <div class="admin-user-name" id="userName">管理员</div>
                        <div class="admin-user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1 class="admin-header-title">仪表盘</h1>
                <div class="admin-header-actions">
                    <a href="/" target="_blank" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.75rem;">
                        查看网站
                    </a>
                    <button class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.75rem;" onclick="logout()">
                        退出登录
                    </button>
                </div>
            </header>

            <div class="admin-content">
                <!-- Stats -->
                <div class="admin-stats">
                    <div class="admin-stat-card">
                        <div class="admin-stat-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                        <div class="admin-stat-value" id="statArticles">0</div>
                        <div class="admin-stat-label">篇文章</div>
                    </div>
                    <div class="admin-stat-card">
                        <div class="admin-stat-icon" style="background: rgba(212, 168, 83, 0.1);">
                            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-gold)" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </div>
                        <div class="admin-stat-value" id="statViews">0</div>
                        <div class="admin-stat-label">总阅读</div>
                    </div>
                    <div class="admin-stat-card">
                        <div class="admin-stat-icon" style="background: rgba(45, 212, 168, 0.1);">
                            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-teal)" stroke-width="2">
                                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                            </svg>
                        </div>
                        <div class="admin-stat-value" id="statPortfolios">0</div>
                        <div class="admin-stat-label">个项目</div>
                    </div>
                    <div class="admin-stat-card">
                        <div class="admin-stat-icon" style="background: rgba(167, 139, 250, 0.1);">
                            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-violet)" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </div>
                        <div class="admin-stat-value" id="statMedia">0</div>
                        <div class="admin-stat-label">媒体文件</div>
                    </div>
                </div>

                <!-- Quick Actions & Recent -->
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-6);">
                    <!-- Recent Articles -->
                    <div class="admin-table-container">
                        <div class="admin-table-toolbar">
                            <h3 style="font-size: var(--text-base); font-weight: var(--font-medium);">最近文章</h3>
                            <a href="/admin/articles/edit" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.75rem;">
                                + 新建文章
                            </a>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>标题</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                </tr>
                            </thead>
                            <tbody id="recentArticles">
                                <tr>
                                    <td colspan="3" style="text-align: center; color: var(--fg-muted);">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Quick Actions -->
                    <div>
                        <div class="admin-editor-panel" style="margin-bottom: var(--space-4);">
                            <div class="admin-editor-panel-title">快捷操作</div>
                            <div style="display: flex; flex-direction: column; gap: var(--space-2);">
                                <a href="/admin/articles/edit" class="btn btn-outline" style="justify-content: center;">
                                    <svg style="width:16px;height:16px;vertical-align:middle;margin-right:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>写新文章
                                </a>
                                <a href="/admin/media" class="btn btn-outline" style="justify-content: center;">
                                    <svg style="width:16px;height:16px;vertical-align:middle;margin-right:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>上传图片
                                </a>
                                <a href="/admin/portfolios" class="btn btn-outline" style="justify-content: center;">
                                    <svg style="width:16px;height:16px;vertical-align:middle;margin-right:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>添加作品
                                </a>
                                <a href="/admin/messages" class="btn btn-outline" style="justify-content: center;">
                                    <svg style="width:16px;height:16px;vertical-align:middle;margin-right:6px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>查看消息
                                </a>
                            </div>
                        </div>

                        <div class="admin-editor-panel">
                            <div class="admin-editor-panel-title">统计概览</div>
                            <div style="display: flex; flex-direction: column; gap: var(--space-3);">
                                <div style="display: flex; justify-content: space-between;">
                                    <span class="text-muted">已发布</span>
                                    <span id="statPublished">0</span>
                                </div>
                                <div style="display: flex; justify-content: space-between;">
                                    <span class="text-muted">草稿</span>
                                    <span id="statDraft">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/admin.js"></script>
    <script>
        // 检查登录状态
        checkAuth();

        // 加载仪表盘数据
        async function loadDashboard() {
            try {
                const res = await fetch('/api/admin/dashboard', {
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    const { stats, recentArticles } = data.data;

                    // 更新统计
                    document.getElementById('statArticles').textContent = stats.articleCount;
                    document.getElementById('statViews').textContent = formatNumber(stats.totalViews);
                    document.getElementById('statPortfolios').textContent = stats.portfolioCount;
                    document.getElementById('statMedia').textContent = stats.mediaCount;
                    document.getElementById('statPublished').textContent = stats.publishedCount;
                    document.getElementById('statDraft').textContent = stats.draftCount;
                    document.getElementById('articleCount').textContent = stats.articleCount;

                    // 渲染最近文章
                    const tbody = document.getElementById('recentArticles');
                    if (recentArticles.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--fg-muted);">暂无文章</td></tr>';
                    } else {
                        tbody.innerHTML = recentArticles.map(article => `
                            <tr>
                                <td>
                                    <a href="/admin/articles/edit/${article.id}" style="color: var(--fg-primary);">
                                        ${escapeHtml(article.title)}
                                    </a>
                                </td>
                                <td>
                                    <span class="admin-table-status ${article.is_published ? 'published' : 'draft'}">
                                        ${article.is_published ? '已发布' : '草稿'}
                                    </span>
                                </td>
                                <td class="text-muted">${formatDate(article.created_at)}</td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('加载仪表盘数据失败:', error);
            }
        }

        // 初始化
        loadDashboard();
    </script>
</body>
</html>
