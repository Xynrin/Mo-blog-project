<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 墨 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-sidebar-header">
                <a href="/admin" class="admin-sidebar-logo">
                    <span class="dot"></span>
                    墨
                    <span class="text">管理后台</span>
                </a>
            </div>
            
            <nav class="admin-sidebar-nav">
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">概览</div>
                    <a href="/admin" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        仪表盘
                    </a>
                </div>
                
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">内容</div>
                    <a href="/admin/articles" class="admin-nav-item active">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        文章管理
                        <span class="badge" id="articleCount">0</span>
                    </a>
                    <a href="/admin/categories" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        分类管理
                    </a>
                    <a href="/admin/portfolios" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        作品集
                    </a>
                    <a href="/admin/media" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        媒体库
                    </a>
                    <a href="/admin/messages" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        消息管理
                    </a>
                </div>
                
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">系统</div>
                    <a href="/admin/settings" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        系统设置
                    </a>
                </div>
            </nav>
            
            <div class="admin-sidebar-footer">
                <div class="admin-user">
                    <div class="admin-user-avatar" id="userAvatar">M</div>
                    <div class="admin-user-info">
                        <div class="admin-user-name" id="userName">管理员</div>
                        <div class="admin-user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1 class="admin-header-title">文章管理</h1>
                <div class="admin-header-actions">
                    <a href="/admin/articles/edit" class="btn btn-primary" style="padding: 0.6rem 1.2rem;">
                        + 新建文章
                    </a>
                </div>
            </header>

            <div class="admin-content">
                <div class="admin-table-container">
                    <div class="admin-table-toolbar">
                        <div class="admin-table-search">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            <input type="text" id="searchInput" placeholder="搜索文章..." onkeyup="handleSearch(event)">
                        </div>
                        <div class="admin-table-filters">
                            <select class="form-select" id="statusFilter" onchange="loadArticles()" style="padding: 0.5rem 1rem; min-width: 120px;">
                                <option value="all">全部状态</option>
                                <option value="published">已发布</option>
                                <option value="draft">草稿</option>
                            </select>
                        </div>
                    </div>

                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" class="admin-table-checkbox" id="selectAll"></th>
                                <th style="width: 80px;">封面</th>
                                <th>标题</th>
                                <th>分类</th>
                                <th>状态</th>
                                <th>阅读量</th>
                                <th>创建时间</th>
                                <th style="width: 100px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="articlesTable">
                            <tr>
                                <td colspan="8" style="text-align: center; color: var(--fg-muted); padding: var(--space-8);">
                                    加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="admin-pagination">
                        <div class="admin-pagination-info" id="paginationInfo">
                            显示 0-0 条，共 0 条
                        </div>
                        <div class="admin-pagination-nav" id="paginationNav">
                            <!-- 分页按钮将动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="admin-modal-backdrop" id="deleteModal">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3 class="admin-modal-title">确认删除</h3>
                <div class="admin-modal-close" onclick="closeDeleteModal()">&times;</div>
            </div>
            <div class="admin-modal-body">
                <p>确定要删除这篇文章吗？此操作不可恢复。</p>
            </div>
            <div class="admin-modal-footer">
                <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-primary" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
    <script>
        // 检查登录状态
        checkAuth();

        let currentPage = 1;
        let currentSearch = '';
        let deleteTargetId = null;

        // 加载文章列表
        async function loadArticles(page = 1) {
            currentPage = page;
            const status = document.getElementById('statusFilter').value;
            
            try {
                const params = new URLSearchParams({
                    page,
                    limit: 10,
                    status,
                    search: currentSearch
                });

                const res = await fetch(`/api/admin/articles?${params}`, {
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    const { articles, pagination } = data.data;
                    
                    document.getElementById('articleCount').textContent = pagination.total;

                    const tbody = document.getElementById('articlesTable');
                    if (articles.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="8" style="text-align: center; color: var(--fg-muted); padding: var(--space-8);">
                                    暂无文章
                                </td>
                            </tr>
                        `;
                    } else {
                        tbody.innerHTML = articles.map(article => `
                            <tr>
                                <td><input type="checkbox" class="admin-table-checkbox" data-id="${article.id}"></td>
                                <td>
                                    ${article.cover_image 
                                        ? `<img src="${article.cover_image}" class="admin-table-thumb" alt="">`
                                        : `<div class="admin-table-thumb" style="display: flex; align-items: center; justify-content: center; color: var(--fg-muted);">无</div>`
                                    }
                                </td>
                                <td>
                                    <a href="/admin/articles/edit/${article.id}" style="color: var(--fg-primary);">
                                        ${escapeHtml(article.title)}
                                    </a>
                                </td>
                                <td class="text-muted">${article.category_name || '-'}</td>
                                <td>
                                    <span class="admin-table-status ${article.is_published ? 'published' : 'draft'}">
                                        ${article.is_published ? '已发布' : '草稿'}
                                    </span>
                                </td>
                                <td class="text-muted">${article.view_count || 0}</td>
                                <td class="text-muted">${formatDate(article.created_at)}</td>
                                <td>
                                    <div class="admin-table-actions">
                                        <a href="/admin/articles/edit/${article.id}" class="admin-table-action" title="编辑">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                            </svg>
                                        </a>
                                        <a href="/article/${article.slug}" target="_blank" class="admin-table-action" title="预览">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                                <circle cx="12" cy="12" r="3"></circle>
                                            </svg>
                                        </a>
                                        <button class="admin-table-action delete" title="删除" onclick="openDeleteModal(${article.id})">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="3 6 5 6 21 6"></polyline>
                                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('');
                    }

                    // 更新分页
                    renderPagination(pagination);
                }
            } catch (error) {
                console.error('加载文章列表失败:', error);
            }
        }

        // 渲染分页
        function renderPagination(pagination) {
            const { page, total, limit, totalPages } = pagination;
            const start = (page - 1) * limit + 1;
            const end = Math.min(page * limit, total);

            document.getElementById('paginationInfo').textContent = 
                `显示 ${start}-${end} 条，共 ${total} 条`;

            const nav = document.getElementById('paginationNav');
            let html = '';

            // 上一页
            html += `<button class="admin-pagination-btn" onclick="loadArticles(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;

            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="admin-pagination-btn ${i === page ? 'active' : ''}" onclick="loadArticles(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += `<span style="color: var(--fg-muted);">...</span>`;
                }
            }

            // 下一页
            html += `<button class="admin-pagination-btn" onclick="loadArticles(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;

            nav.innerHTML = html;
        }

        // 搜索
        function handleSearch(event) {
            if (event.key === 'Enter') {
                currentSearch = event.target.value;
                loadArticles(1);
            }
        }

        // 删除模态框
        function openDeleteModal(id) {
            deleteTargetId = id;
            document.getElementById('deleteModal').classList.add('open');
        }

        function closeDeleteModal() {
            deleteTargetId = null;
            document.getElementById('deleteModal').classList.remove('open');
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (!deleteTargetId) return;

            try {
                const res = await fetch(`/api/admin/articles/${deleteTargetId}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    closeDeleteModal();
                    loadArticles(currentPage);
                    showToast('文章已删除', 'success');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        });

        // 全选
        document.getElementById('selectAll').addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('#articlesTable .admin-table-checkbox');
            checkboxes.forEach(cb => cb.checked = e.target.checked);
        });

        // 初始化
        loadArticles();
    </script>
</body>
</html>
