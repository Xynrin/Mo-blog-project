<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 墨 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .editor-title-input {
            width: 100%;
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
            background: transparent;
            border: none;
            color: var(--fg-primary);
            padding: var(--space-2) 0;
            border-bottom: 2px solid var(--border-subtle);
            margin-bottom: var(--space-5);
        }
        .editor-title-input:focus {
            outline: none;
            border-color: var(--accent-coral);
        }
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-2);
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-bottom: none;
        }
        .editor-toolbar-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--fg-secondary);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .editor-toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--fg-primary);
        }
        .editor-content {
            width: 100%;
            min-height: 400px;
            font-family: var(--font-mono);
            font-size: var(--text-base);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--fg-primary);
            padding: var(--space-4);
            resize: vertical;
            line-height: 1.8;
        }
        .editor-content:focus {
            outline: none;
            border-color: var(--accent-coral);
        }
        .editor-preview {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: var(--space-6);
            min-height: 400px;
            overflow: auto;
        }
        .editor-preview h1 { font-size: var(--text-2xl); margin-bottom: var(--space-4); }
        .editor-preview h2 { font-size: var(--text-xl); margin-bottom: var(--space-3); }
        .editor-preview h3 { font-size: var(--text-lg); margin-bottom: var(--space-2); }
        .editor-preview p { margin-bottom: var(--space-4); line-height: 1.8; }
        .editor-preview pre { 
            background: var(--bg-secondary); 
            padding: var(--space-4); 
            overflow-x: auto;
            margin-bottom: var(--space-4);
        }
        .editor-preview code { 
            font-family: var(--font-mono);
            background: var(--bg-secondary);
            padding: 0.2rem 0.4rem;
        }
        .editor-preview pre code { background: transparent; padding: 0; }
        .editor-preview blockquote {
            border-left: 3px solid var(--accent-coral);
            padding-left: var(--space-4);
            margin: var(--space-4) 0;
            color: var(--fg-secondary);
        }
        .editor-preview ul, .editor-preview ol {
            margin-left: var(--space-6);
            margin-bottom: var(--space-4);
        }
        .editor-preview li { margin-bottom: var(--space-2); }
        .editor-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: var(--space-4);
        }
        .editor-tab {
            padding: var(--space-2) var(--space-4);
            font-size: var(--text-sm);
            color: var(--fg-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition-fast);
        }
        .editor-tab:hover {
            color: var(--fg-primary);
        }
        .editor-tab.active {
            color: var(--accent-coral);
            border-color: var(--accent-coral);
        }
        .tags-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            padding: var(--space-2);
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            min-height: 42px;
        }
        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            background: var(--accent-coral);
            color: var(--bg-primary);
            padding: 0.2rem 0.6rem;
            font-size: var(--text-sm);
        }
        .tag-item .remove {
            cursor: pointer;
            opacity: 0.7;
        }
        .tag-item .remove:hover {
            opacity: 1;
        }
        .tag-input {
            border: none;
            background: transparent;
            color: var(--fg-primary);
            font-size: var(--text-sm);
            flex: 1;
            min-width: 100px;
        }
        .tag-input:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-sidebar-header">
                <a href="/admin" class="admin-sidebar-logo">
                    <span class="dot"></span>
                    墨
                    <span class="text">管理后台</span>
                </a>
            </div>
            
            <nav class="admin-sidebar-nav">
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">概览</div>
                    <a href="/admin" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        仪表盘
                    </a>
                </div>
                
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">内容</div>
                    <a href="/admin/articles" class="admin-nav-item active">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        文章管理
                    </a>
                    <a href="/admin/categories" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        分类管理
                    </a>
                    <a href="/admin/portfolios" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        作品集
                    </a>
                    <a href="/admin/media" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        媒体库
                    </a>
                    <a href="/admin/messages" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        消息管理
                    </a>
                </div>
                
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">系统</div>
                    <a href="/admin/settings" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        系统设置
                    </a>
                </div>
            </nav>
            
            <div class="admin-sidebar-footer">
                <div class="admin-user">
                    <div class="admin-user-avatar" id="userAvatar">M</div>
                    <div class="admin-user-info">
                        <div class="admin-user-name" id="userName">管理员</div>
                        <div class="admin-user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1 class="admin-header-title" id="pageTitle">新建文章</h1>
                <div class="admin-header-actions">
                    <a href="/admin/articles" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.75rem;">
                        返回列表
                    </a>
                </div>
            </header>

            <div class="admin-content">
                <div class="admin-editor">
                    <!-- Main Editor -->
                    <div class="admin-editor-main">
                        <input type="text" class="editor-title-input" id="title" placeholder="文章标题">
                        
                        <div class="editor-toolbar">
                            <button class="editor-toolbar-btn" onclick="insertMarkdown('**', '**')" title="粗体">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                                    <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="insertMarkdown('*', '*')" title="斜体">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="19" y1="4" x2="10" y2="4"></line>
                                    <line x1="14" y1="20" x2="5" y2="20"></line>
                                    <line x1="15" y1="4" x2="9" y2="20"></line>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="insertMarkdown('## ', '')" title="标题">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 12h8"></path>
                                    <path d="M4 18V6"></path>
                                    <path d="M12 18V6"></path>
                                    <path d="m17 12 3-2v8"></path>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="insertMarkdown('- ', '')" title="列表">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="8" y1="6" x2="21" y2="6"></line>
                                    <line x1="8" y1="12" x2="21" y2="12"></line>
                                    <line x1="8" y1="18" x2="21" y2="18"></line>
                                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="insertMarkdown('> ', '')" title="引用">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"></path>
                                    <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"></path>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="insertMarkdown('`', '`')" title="代码">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="insertMarkdown('\n```\n', '\n```\n')" title="代码块">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <polyline points="9 8 5 12 9 16"></polyline>
                                    <polyline points="15 8 19 12 15 16"></polyline>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="insertLink()" title="链接">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="openMediaModal()" title="插入图片">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </button>
                            <button class="editor-toolbar-btn" onclick="openVideoModal()" title="插入视频">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                            </button>
                        </div>
                        
                        <div class="editor-tabs">
                            <div class="editor-tab active" onclick="switchTab('write')">编辑</div>
                            <div class="editor-tab" onclick="switchTab('preview')">预览</div>
                        </div>
                        
                        <div id="writePanel">
                            <textarea class="editor-content" id="content" placeholder="使用 Markdown 编写文章内容..."></textarea>
                        </div>
                        
                        <div id="previewPanel" style="display: none;">
                            <div class="editor-preview" id="preview"></div>
                        </div>
                        
                        <div class="form-group" style="margin-top: var(--space-5);">
                            <label class="form-label">文章摘要</label>
                            <textarea class="form-textarea" id="excerpt" placeholder="文章摘要，用于列表展示..." style="min-height: 80px;"></textarea>
                        </div>
                    </div>

                    <!-- Sidebar -->
                    <div class="admin-editor-sidebar">
                        <!-- Cover Image -->
                        <div class="admin-editor-panel">
                            <div class="admin-editor-panel-title">封面图</div>
                            <div id="coverPreview" style="display: none;" class="admin-cover-preview">
                                <img id="coverImg" src="" alt="">
                                <div class="remove" onclick="removeCover()">&times;</div>
                            </div>
                            <div id="coverUpload" class="admin-cover-upload" onclick="openCoverModal()">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                                <div class="text">点击上传封面图</div>
                                <div style="font-size:11px;color:var(--fg-muted);margin-top:4px;">建议比例 16:9，支持 JPG/PNG/WebP</div>
                            </div>
                        </div>

                        <!-- Category -->
                        <div class="admin-editor-panel">
                            <div class="admin-editor-panel-title">分类</div>
                            <select class="form-select" id="category" style="width: 100%;">
                                <option value="">选择分类</option>
                            </select>
                        </div>

                        <!-- Tags -->
                        <div class="admin-editor-panel">
                            <div class="admin-editor-panel-title">标签</div>
                            <div class="tags-input-container" id="tagsContainer">
                                <input type="text" class="tag-input" id="tagInput" placeholder="输入标签后按回车">
                            </div>
                        </div>

                        <!-- Options -->
                        <div class="admin-editor-panel">
                            <div class="admin-editor-panel-title">选项</div>
                            <div style="display: flex; flex-direction: column; gap: var(--space-3);">
                                <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
                                    <input type="checkbox" id="isPublished">
                                    <span>立即发布</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
                                    <input type="checkbox" id="isFeatured">
                                    <span>设为精选</span>
                                </label>
                            </div>
                        </div>

                        <!-- URL Slug -->
                        <div class="admin-editor-panel">
                            <div class="admin-editor-panel-title">URL 标识</div>
                            <input type="text" class="form-input" id="slug" placeholder="article-url-slug">
                            <div class="text-muted" style="font-size: var(--text-xs); margin-top: var(--space-2);">
                                用于文章访问地址，留空自动生成
                            </div>
                        </div>

                        <!-- Actions -->
                        <div style="display: flex; flex-direction: column; gap: var(--space-3);">
                            <button class="btn btn-primary" onclick="saveArticle()" id="saveBtn" style="justify-content: center;">
                                保存文章
                            </button>
                            <button class="btn btn-outline" onclick="saveDraft()" style="justify-content: center;">
                                保存草稿
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Media Modal -->
    <div class="admin-modal-backdrop" id="mediaModal">
        <div class="admin-modal" style="max-width: 800px;">
            <div class="admin-modal-header">
                <h3 class="admin-modal-title">选择图片</h3>
                <div class="admin-modal-close" onclick="closeMediaModal()">&times;</div>
            </div>
            <div class="admin-modal-body">
                <div style="margin-bottom: var(--space-4);">
                    <input type="file" id="fileInput" accept="image/*,video/*,.pdf" style="display: none;" onchange="uploadImage(event)" multiple>
                    <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">
                        上传新图片
                    </button>
                </div>
                <div class="admin-media-grid" id="mediaGrid">
                    <div style="text-align: center; color: var(--fg-muted); padding: var(--space-8);">
                        加载中...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Video Embed Modal -->
    <div class="admin-modal-backdrop" id="videoModal">
        <div class="admin-modal" style="max-width: 500px;">
            <div class="admin-modal-header">
                <h3 class="admin-modal-title">插入视频</h3>
                <div class="admin-modal-close" onclick="closeVideoModal()">&times;</div>
            </div>
            <div class="admin-modal-body">
                <div class="form-group">
                    <label class="form-label">视频链接</label>
                    <input type="text" class="form-input" id="videoUrl" placeholder="支持 YouTube、Bilibili 或直接 mp4 链接">
                </div>
                <div style="font-size: var(--text-xs); color: var(--fg-muted); margin-bottom: var(--space-4);">
                    支持格式：https://www.youtube.com/watch?v=xxx 、 https://www.bilibili.com/video/BVxxx 、 https://xxx.mp4
                </div>
                <div style="display: flex; gap: var(--space-3); justify-content: flex-end;">
                    <button class="btn btn-outline" onclick="closeVideoModal()">取消</button>
                    <button class="btn btn-primary" onclick="insertVideo()">插入</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 检查登录状态
        checkAuth();

        let articleId = null;
        let tags = [];
        let coverImage = '';
        let isSelectingCover = false;

        // 获取文章ID
        const pathParts = window.location.pathname.split('/');
        const idIndex = pathParts.indexOf('edit');
        if (idIndex !== -1 && pathParts[idIndex + 1]) {
            articleId = parseInt(pathParts[idIndex + 1]);
            document.getElementById('pageTitle').textContent = '编辑文章';
        }

        // 加载分类
        async function loadCategories() {
            try {
                const res = await fetch('/api/admin/categories', {
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    const select = document.getElementById('category');
                    data.data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载分类失败:', error);
            }
        }

        // 加载文章数据
        async function loadArticle() {
            if (!articleId) return;

            try {
                const res = await fetch(`/api/admin/articles/${articleId}`, {
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    const article = data.data;
                    document.getElementById('title').value = article.title;
                    document.getElementById('content').value = article.content || '';
                    document.getElementById('excerpt').value = article.excerpt || '';
                    document.getElementById('slug').value = article.slug || '';
                    document.getElementById('category').value = article.category_id || '';
                    document.getElementById('isPublished').checked = article.is_published === 1;
                    document.getElementById('isFeatured').checked = article.is_featured === 1;

                    // 封面图
                    if (article.cover_image) {
                        coverImage = article.cover_image;
                        document.getElementById('coverImg').src = coverImage;
                        document.getElementById('coverPreview').style.display = 'block';
                        document.getElementById('coverUpload').style.display = 'none';
                    }

                    // 标签
                    if (article.tags) {
                        tags = article.tags.map(t => t.name);
                        renderTags();
                    }

                    updatePreview();
                }
            } catch (error) {
                console.error('加载文章失败:', error);
            }
        }

        // 标签处理
        document.getElementById('tagInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const value = e.target.value.trim();
                if (value && !tags.includes(value)) {
                    tags.push(value);
                    renderTags();
                }
                e.target.value = '';
            }
        });

        function renderTags() {
            const container = document.getElementById('tagsContainer');
            const input = document.getElementById('tagInput');
            
            // 清除现有标签
            container.querySelectorAll('.tag-item').forEach(el => el.remove());
            
            // 添加标签
            tags.forEach((tag, index) => {
                const tagEl = document.createElement('span');
                tagEl.className = 'tag-item';
                tagEl.innerHTML = `${tag}<span class="remove" onclick="removeTag(${index})">&times;</span>`;
                container.insertBefore(tagEl, input);
            });
        }

        function removeTag(index) {
            tags.splice(index, 1);
            renderTags();
        }

        // Markdown 工具栏
        function insertMarkdown(before, after) {
            const textarea = document.getElementById('content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selected = text.substring(start, end);

            textarea.value = text.substring(0, start) + before + selected + after + text.substring(end);
            textarea.focus();
            textarea.selectionStart = start + before.length;
            textarea.selectionEnd = start + before.length + selected.length;
            updatePreview();
        }

        function insertLink() {
            const url = prompt('请输入链接地址:');
            if (url) {
                insertMarkdown('[', `](${url})`);
            }
        }

        // 编辑/预览切换
        function switchTab(tab) {
            document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'write') {
                document.getElementById('writePanel').style.display = 'block';
                document.getElementById('previewPanel').style.display = 'none';
            } else {
                document.getElementById('writePanel').style.display = 'none';
                document.getElementById('previewPanel').style.display = 'block';
                updatePreview();
            }
        }

        function updatePreview() {
            const content = document.getElementById('content').value;
            document.getElementById('preview').innerHTML = marked.parse(content);
        }

        document.getElementById('content').addEventListener('input', updatePreview);

        // 封面图
        function openCoverModal() {
            isSelectingCover = true;
            openMediaModal();
        }

        function removeCover() {
            coverImage = '';
            document.getElementById('coverPreview').style.display = 'none';
            document.getElementById('coverUpload').style.display = 'block';
        }

        // 媒体库
        async function openMediaModal() {
            document.getElementById('mediaModal').classList.add('open');
            await loadMedia();
        }

        function closeMediaModal() {
            document.getElementById('mediaModal').classList.remove('open');
        }

        async function loadMedia() {
            try {
                const res = await fetch('/api/admin/media?limit=20', {
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                const grid = document.getElementById('mediaGrid');
                if (data.success && data.data.media.length > 0) {
                    grid.innerHTML = data.data.media.map(item => `
                        <div class="admin-media-item" onclick="selectMedia('${item.file_path}')">
                            <img src="${item.file_path}" alt="">
                            <div class="overlay">
                                <div class="actions">
                                    <div class="action">选择</div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div style="text-align: center; color: var(--fg-muted); padding: var(--space-8); grid-column: 1/-1;">暂无图片</div>';
                }
            } catch (error) {
                console.error('加载媒体库失败:', error);
            }
        }

        async function uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('/api/admin/media/upload', {
                    method: 'POST',
                    headers: getAuthHeaders(true),
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    await loadMedia();
                    showToast('上传成功', 'success');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('上传失败', 'error');
            }

            event.target.value = '';
        }

        function selectMedia(url) {
            if (isSelectingCover) {
                coverImage = url;
                document.getElementById('coverImg').src = url;
                document.getElementById('coverPreview').style.display = 'block';
                document.getElementById('coverUpload').style.display = 'none';
                isSelectingCover = false;
            } else {
                insertMarkdown('![image](', `${url})`);
            }
            closeMediaModal();
        }

        // 视频嵌入
        function openVideoModal() {
            document.getElementById('videoModal').classList.add('open');
            document.getElementById('videoUrl').value = '';
            setTimeout(() => document.getElementById('videoUrl').focus(), 100);
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('open');
        }

        function insertVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) { showToast('请输入视频链接', 'error'); return; }

            let embedHtml = '';

            // YouTube
            const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            if (ytMatch) {
                embedHtml = `<div style="max-width:100%;aspect-ratio:16/9;margin:1.5rem 0;"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen style="width:100%;height:100%;border-radius:8px;"></iframe></div>`;
            }
            // Bilibili
            const biliMatch = url.match(/bilibili\.com\/video\/(BV[a-zA-Z0-9]+)/);
            if (biliMatch) {
                embedHtml = `<div style="max-width:100%;aspect-ratio:16/9;margin:1.5rem 0;"><iframe src="https://player.bilibili.com/player.html?bvid=${biliMatch[1]}&high_quality=1" frameborder="0" allowfullscreen style="width:100%;height:100%;border-radius:8px;"></iframe></div>`;
            }
            // 直接视频链接
            if (!embedHtml && (url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.ogg'))) {
                embedHtml = `<div style="max-width:100%;aspect-ratio:16/9;margin:1.5rem 0;"><video src="${url}" controls style="width:100%;height:100%;border-radius:8px;background:#000;"></video></div>`;
            }

            if (!embedHtml) {
                showToast('无法识别的视频链接格式', 'error');
                return;
            }

            const textarea = document.getElementById('content');
            const pos = textarea.selectionStart;
            const text = textarea.value;
            textarea.value = text.substring(0, pos) + '\n' + embedHtml + '\n' + text.substring(pos);
            textarea.focus();
            updatePreview();
            closeVideoModal();
            showToast('视频已插入', 'success');
        }

        // 保存文章
        async function saveArticle() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!title) {
                showToast('请输入文章标题', 'error');
                return;
            }

            if (!content) {
                showToast('请输入文章内容', 'error');
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            const articleData = {
                title,
                content,
                excerpt: document.getElementById('excerpt').value.trim(),
                slug: document.getElementById('slug').value.trim(),
                category_id: document.getElementById('category').value || null,
                cover_image: coverImage,
                tags,
                is_published: document.getElementById('isPublished').checked,
                is_featured: document.getElementById('isFeatured').checked
            };

            try {
                const url = articleId 
                    ? `/api/admin/articles/${articleId}`
                    : '/api/admin/articles';
                const method = articleId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(articleData)
                });
                const data = await res.json();

                if (data.success) {
                    showToast('保存成功', 'success');
                    if (!articleId && data.data.id) {
                        window.location.href = `/admin/articles/edit/${data.data.id}`;
                    }
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('保存失败', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存文章';
            }
        }

        function saveDraft() {
            document.getElementById('isPublished').checked = false;
            saveArticle();
        }

        // 初始化
        loadCategories().then(() => {
            if (articleId) {
                loadArticle();
            }
        });
    </script>
</body>
</html>
