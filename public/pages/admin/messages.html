<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息管理 - 墨 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        /* 未读消息行高亮 */
        .message-row-unread {
            background-color: var(--bg-accent, #f0f7ff);
        }
        /* 已读/未读标签 */
        .status-read {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            background-color: var(--bg-secondary, #f3f4f6);
            color: var(--fg-muted, #6b7280);
        }
        .status-unread {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            background-color: var(--color-primary, #3b82f6);
            color: #fff;
        }
        /* 消息详情模态框内容 */
        .message-detail-field {
            margin-bottom: 1rem;
        }
        .message-detail-label {
            font-size: 0.8rem;
            color: var(--fg-muted, #6b7280);
            margin-bottom: 0.25rem;
        }
        .message-detail-value {
            font-size: 0.95rem;
            color: var(--fg-primary, #1f2937);
            word-break: break-word;
        }
        .message-detail-body {
            background-color: var(--bg-secondary, #f9fafb);
            border: 1px solid var(--border-color, #e5e7eb);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-sidebar-header">
                <a href="/admin" class="admin-sidebar-logo">
                    <span class="dot"></span>
                    墨
                    <span class="text">管理后台</span>
                </a>
            </div>

            <nav class="admin-sidebar-nav">
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">概览</div>
                    <a href="/admin" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        仪表盘
                    </a>
                </div>

                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">内容</div>
                    <a href="/admin/articles" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        文章管理
                    </a>
                    <a href="/admin/categories" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        分类管理
                    </a>
                    <a href="/admin/portfolios" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        作品集
                    </a>
                    <a href="/admin/media" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        媒体库
                    </a>
                    <a href="/admin/messages" class="admin-nav-item active">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        消息管理
                        <span class="badge" id="unreadCount">0</span>
                    </a>
                </div>

                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">系统</div>
                    <a href="/admin/settings" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        系统设置
                    </a>
                </div>
            </nav>

            <div class="admin-sidebar-footer">
                <div class="admin-user">
                    <div class="admin-user-avatar" id="userAvatar">M</div>
                    <div class="admin-user-info">
                        <div class="admin-user-name" id="userName">管理员</div>
                        <div class="admin-user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1 class="admin-header-title">消息管理</h1>
                <div class="admin-header-actions">
                    <!-- 可扩展：全部标记已读等操作 -->
                </div>
            </header>

            <div class="admin-content">
                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>发件人</th>
                                <th>邮箱</th>
                                <th>主题</th>
                                <th>时间</th>
                                <th>状态</th>
                                <th style="width: 160px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="messagesTable">
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--fg-muted); padding: var(--space-8);">
                                    加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="admin-pagination">
                        <div class="admin-pagination-info" id="paginationInfo">
                            显示 0-0 条，共 0 条
                        </div>
                        <div class="admin-pagination-nav" id="paginationNav">
                            <!-- 分页按钮将动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- View Message Modal -->
    <div class="admin-modal-backdrop" id="viewModal">
        <div class="admin-modal" style="max-width: 640px;">
            <div class="admin-modal-header">
                <h3 class="admin-modal-title">消息详情</h3>
                <div class="admin-modal-close" onclick="closeViewModal()">&times;</div>
            </div>
            <div class="admin-modal-body">
                <div class="message-detail-field">
                    <div class="message-detail-label">发件人</div>
                    <div class="message-detail-value" id="viewSender"></div>
                </div>
                <div class="message-detail-field">
                    <div class="message-detail-label">邮箱</div>
                    <div class="message-detail-value" id="viewEmail"></div>
                </div>
                <div class="message-detail-field">
                    <div class="message-detail-label">主题</div>
                    <div class="message-detail-value" id="viewSubject"></div>
                </div>
                <div class="message-detail-field">
                    <div class="message-detail-label">时间</div>
                    <div class="message-detail-value" id="viewDate"></div>
                </div>
                <div class="message-detail-field">
                    <div class="message-detail-label">内容</div>
                    <div class="message-detail-body" id="viewBody"></div>
                </div>
            </div>
            <div class="admin-modal-footer">
                <button class="btn btn-outline" onclick="closeViewModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="admin-modal-backdrop" id="deleteModal">
        <div class="admin-modal">
            <div class="admin-modal-header">
                <h3 class="admin-modal-title">确认删除</h3>
                <div class="admin-modal-close" onclick="closeDeleteModal()">&times;</div>
            </div>
            <div class="admin-modal-body">
                <p>确定要删除这条消息吗？此操作不可恢复。</p>
            </div>
            <div class="admin-modal-footer">
                <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-primary" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
    <script>
        // 检查登录状态
        checkAuth();

        let currentPage = 1;
        let deleteTargetId = null;

        // 加载消息列表
        async function loadMessages(page = 1) {
            currentPage = page;

            try {
                const res = await fetch(`/api/admin/messages?page=${page}`, {
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    const { messages, pagination } = data.data;

                    // 更新未读数
                    const unreadCount = messages.filter(m => !m.is_read).length;
                    const badge = document.getElementById('unreadCount');
                    if (badge) {
                        badge.textContent = unreadCount > 0 ? unreadCount : '0';
                        badge.style.display = unreadCount > 0 ? 'inline' : 'none';
                    }

                    const tbody = document.getElementById('messagesTable');
                    if (messages.length === 0) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--fg-muted); padding: var(--space-8);">
                                    暂无消息
                                </td>
                            </tr>
                        `;
                    } else {
                        tbody.innerHTML = messages.map(msg => `
                            <tr class="${msg.is_read ? '' : 'message-row-unread'}">
                                <td>${escapeHtml(msg.sender || msg.name || '-')}</td>
                                <td class="text-muted">${escapeHtml(msg.email || '-')}</td>
                                <td>${escapeHtml(msg.subject || '-')}</td>
                                <td class="text-muted">${formatDate(msg.created_at)}</td>
                                <td>
                                    <span class="${msg.is_read ? 'status-read' : 'status-unread'}">
                                        ${msg.is_read ? '已读' : '未读'}
                                    </span>
                                </td>
                                <td>
                                    <div class="admin-table-actions">
                                        <button class="admin-table-action" title="查看" onclick="viewMessage(${msg.id})">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                                <circle cx="12" cy="12" r="3"></circle>
                                            </svg>
                                        </button>
                                        ${!msg.is_read ? `
                                        <button class="admin-table-action" title="标记已读" onclick="markRead(${msg.id})">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="20 6 9 17 4 12"></polyline>
                                            </svg>
                                        </button>
                                        ` : ''}
                                        <button class="admin-table-action delete" title="删除" onclick="deleteMessage(${msg.id})">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <polyline points="3 6 5 6 21 6"></polyline>
                                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('');
                    }

                    // 更新分页
                    renderPagination(pagination);
                }
            } catch (error) {
                console.error('加载消息列表失败:', error);
                showToast('加载消息列表失败', 'error');
            }
        }

        // 渲染分页
        function renderPagination(pagination) {
            const { page, total, limit, totalPages } = pagination;
            const start = (page - 1) * limit + 1;
            const end = Math.min(page * limit, total);

            document.getElementById('paginationInfo').textContent =
                `显示 ${start}-${end} 条，共 ${total} 条`;

            const nav = document.getElementById('paginationNav');
            let html = '';

            // 上一页
            html += `<button class="admin-pagination-btn" onclick="loadMessages(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;

            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="admin-pagination-btn ${i === page ? 'active' : ''}" onclick="loadMessages(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += `<span style="color: var(--fg-muted);">...</span>`;
                }
            }

            // 下一页
            html += `<button class="admin-pagination-btn" onclick="loadMessages(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;

            nav.innerHTML = html;
        }

        // 查看消息详情
        async function viewMessage(id) {
            try {
                // 标记已读
                const res = await fetch(`/api/admin/messages/${id}`, {
                    method: 'PUT',
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    const msg = data.data;

                    document.getElementById('viewSender').textContent = msg.sender || msg.name || '-';
                    document.getElementById('viewEmail').textContent = msg.email || '-';
                    document.getElementById('viewSubject').textContent = msg.subject || '-';
                    document.getElementById('viewDate').textContent = formatDate(msg.created_at);
                    document.getElementById('viewBody').textContent = msg.content || msg.body || '-';

                    document.getElementById('viewModal').classList.add('open');

                    // 刷新列表以更新已读状态
                    loadMessages(currentPage);
                } else {
                    showToast(data.message || '获取消息详情失败', 'error');
                }
            } catch (error) {
                console.error('查看消息失败:', error);
                showToast('查看消息失败', 'error');
            }
        }

        // 关闭查看模态框
        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('open');
        }

        // 标记已读
        async function markRead(id) {
            try {
                const res = await fetch(`/api/admin/messages/${id}`, {
                    method: 'PUT',
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    showToast('已标记为已读', 'success');
                    loadMessages(currentPage);
                } else {
                    showToast(data.message || '操作失败', 'error');
                }
            } catch (error) {
                console.error('标记已读失败:', error);
                showToast('标记已读失败', 'error');
            }
        }

        // 删除消息 - 打开确认模态框
        function deleteMessage(id) {
            deleteTargetId = id;
            document.getElementById('deleteModal').classList.add('open');
        }

        // 关闭删除模态框
        function closeDeleteModal() {
            deleteTargetId = null;
            document.getElementById('deleteModal').classList.remove('open');
        }

        // 确认删除
        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (!deleteTargetId) return;

            try {
                const res = await fetch(`/api/admin/messages/${deleteTargetId}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                const data = await res.json();

                if (data.success) {
                    closeDeleteModal();
                    loadMessages(currentPage);
                    showToast('消息已删除', 'success');
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除消息失败:', error);
                showToast('删除失败', 'error');
            }
        });

        // 初始化
        loadMessages();
    </script>
</body>
</html>
