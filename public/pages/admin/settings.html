<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 墨 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1/dist/cropper.min.css">
    <style>
        .tab-nav { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-nav .btn { min-width: 120px; text-align: center; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 900px; }
        .settings-section { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 2rem; }
        .settings-section-title { font-size: var(--text-lg); font-weight: var(--font-medium); margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 0.5rem; }
        .settings-section-title span { font-size: 1.2rem; }
        .settings-actions { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle); display: flex; justify-content: flex-end; gap: 0.8rem; }
        .social-item { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
        .social-item svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--fg-muted); }
        .social-item .social-label { width: 80px; flex-shrink: 0; font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--fg-secondary); }
        .social-item .form-input { flex: 1; }
        .smtp-actions { display: flex; gap: 0.8rem; }
        .template-vars { margin-top: 0.5rem; font-size: var(--text-xs); color: var(--fg-muted); line-height: 1.8; }
        .template-vars code { background: var(--bg-secondary); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: var(--text-xs); }
        @media (max-width: 768px) { .settings-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-sidebar-header">
                <a href="/admin" class="admin-sidebar-logo">
                    <span class="dot"></span> 墨
                    <span class="text">管理后台</span>
                </a>
            </div>
            <nav class="admin-sidebar-nav">
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">概览</div>
                    <a href="/admin" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        仪表盘
                    </a>
                </div>
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">内容</div>
                    <a href="/admin/articles" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                        文章管理
                    </a>
                    <a href="/admin/categories" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        分类管理
                    </a>
                    <a href="/admin/portfolios" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                        作品集
                    </a>
                    <a href="/admin/media" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        媒体库
                    </a>
                    <a href="/admin/messages" class="admin-nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        消息管理
                    </a>
                </div>
                <div class="admin-nav-section">
                    <div class="admin-nav-section-title">系统</div>
                    <a href="/admin/settings" class="admin-nav-item active">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        系统设置
                    </a>
                </div>
            </nav>
            <div class="admin-sidebar-footer">
                <div class="admin-user">
                    <div class="admin-user-avatar" id="userAvatar">M</div>
                    <div class="admin-user-info">
                        <div class="admin-user-name" id="userName">管理员</div>
                        <div class="admin-user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1 class="admin-header-title">系统设置</h1>
            </header>

            <div class="admin-content">
                <!-- Tab Navigation -->
                <div class="tab-nav">
                    <button class="btn btn-primary" data-tab="site" onclick="switchTab('site')">网站信息</button>
                    <button class="btn btn-outline" data-tab="social" onclick="switchTab('social')">社交媒体</button>
                    <button class="btn btn-outline" data-tab="email" onclick="switchTab('email')">邮件服务</button>
                    <button class="btn btn-outline" data-tab="password" onclick="switchTab('password')">账号安全</button>
                </div>

                <!-- Tab: 网站信息 -->
                <div class="tab-content active" id="tab-site">
                    <div class="admin-card">
                        <div class="settings-grid">
                            <div class="settings-section">
                                <h3 class="settings-section-title"><span><svg style="width:18px;height:18px;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span> 网站信息</h3>
                                <div class="form-group">
                                    <label class="form-label">网站图标 (Favicon)</label>
                                    <div style="display:flex;align-items:center;gap:1rem;">
                                        <div id="faviconPreview" style="width:32px;height:32px;border-radius:6px;background:var(--bg-secondary);border:2px dashed var(--border-subtle);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
                                            <svg style="width:16px;height:16px;color:var(--fg-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                                        </div>
                                        <div style="flex:1;">
                                            <input type="text" class="form-input" id="siteFavicon" placeholder="Favicon 图片 URL（建议 32x32 或 64x64 的 ICO/PNG）" style="margin-bottom:0.5rem;">
                                            <button type="button" class="btn btn-outline" style="padding:0.4rem 0.8rem;font-size:var(--text-sm);" onclick="document.getElementById('faviconUpload').click()">上传图标</button>
                                            <input type="file" id="faviconUpload" accept="image/*" style="display:none;" onchange="uploadFavicon(event)">
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">作者头像</label>
                                    <div style="display:flex;align-items:center;gap:1rem;">
                                        <div id="avatarPreview" style="width:64px;height:64px;border-radius:50%;background:var(--bg-secondary);border:2px dashed var(--border-subtle);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">
                                            <svg style="width:24px;height:24px;color:var(--fg-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                        </div>
                                        <div style="flex:1;">
                                            <input type="text" class="form-input" id="authorAvatar" placeholder="头像图片 URL" style="margin-bottom:0.5rem;">
                                            <button type="button" class="btn btn-outline" style="padding:0.4rem 0.8rem;font-size:var(--text-sm);" onclick="document.getElementById('avatarUpload').click()">上传图片</button>
                                            <input type="file" id="avatarUpload" accept="image/*" style="display:none;" onchange="uploadAvatar(event)">
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">站点名称</label>
                                    <input type="text" class="form-input" id="siteName" placeholder="博客名称">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">站点描述</label>
                                    <textarea class="form-textarea" id="siteDesc" placeholder="一句话描述你的博客" style="min-height: 80px;"></textarea>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">作者名称</label>
                                    <input type="text" class="form-input" id="authorName" placeholder="你的名字">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">作者简介</label>
                                    <textarea class="form-textarea" id="authorBio" placeholder="简短的自我介绍" style="min-height: 80px;"></textarea>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">每页文章数</label>
                                    <input type="number" class="form-input" id="postsPerPage" value="10" min="1" max="50">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">页脚文字</label>
                                    <input type="text" class="form-input" id="footerText" placeholder="页脚版权信息">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">备案信息</label>
                                    <input type="text" class="form-input" id="icpText" placeholder="如：京ICP备2026XXXXXX号" style="margin-bottom:0.5rem;">
                                    <input type="text" class="form-input" id="icpUrl" placeholder="备案链接（如 https://beian.miit.gov.cn/），留空则不显示">
                                </div>
                                <div class="settings-actions">
                                    <button class="btn btn-primary" style="padding: 0.6rem 1.2rem;" onclick="saveSettings()">保存设置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: 社交媒体 -->
                <div class="tab-content" id="tab-social">
                    <div class="admin-card">
                        <div class="settings-section">
                            <h3 class="settings-section-title"><span><svg style="width:18px;height:18px;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> 社交媒体链接</h3>

                            <div class="social-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                                <span class="social-label">GitHub</span>
                                <input type="text" class="form-input" id="social_github" placeholder="https://github.com/yourname">
                            </div>

                            <div class="social-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
                                <span class="social-label">Bilibili</span>
                                <input type="text" class="form-input" id="social_bilibili" placeholder="https://space.bilibili.com/yourid">
                            </div>

                            <div class="social-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.43z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>
                                <span class="social-label">YouTube</span>
                                <input type="text" class="form-input" id="social_youtube" placeholder="https://youtube.com/@yourchannel">
                            </div>

                            <div class="social-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l11.733 16h4.267l-11.733 -16h-4.267z"/><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"/></svg>
                                <span class="social-label">X(Twitter)</span>
                                <input type="text" class="form-input" id="social_x" placeholder="https://x.com/yourname">
                            </div>

                            <div class="social-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
                                <span class="social-label">Gitee</span>
                                <input type="text" class="form-input" id="social_gitee" placeholder="https://gitee.com/yourname">
                            </div>

                            <div class="social-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                <span class="social-label">QQ</span>
                                <input type="text" class="form-input" id="social_qq" placeholder="tencent://message/?uin=yourqq">
                            </div>

                            <div class="social-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                <span class="social-label">Email</span>
                                <input type="text" class="form-input" id="social_email" placeholder="mailto:your@email.com">
                            </div>

                            <div class="settings-actions">
                                <button class="btn btn-primary" style="padding: 0.6rem 1.2rem;" onclick="saveSettings()">保存设置</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: 邮件服务 -->
                <div class="tab-content" id="tab-email">
                    <div class="admin-card">
                        <div class="settings-section">
                            <h3 class="settings-section-title"><span><svg style="width:18px;height:18px;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span> SMTP 邮件服务</h3>

                            <div class="form-group">
                                <label class="form-label">SMTP 服务器</label>
                                <input type="text" class="form-input" id="smtp_host" placeholder="例如: smtp.qq.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">SMTP 端口</label>
                                <input type="number" class="form-input" id="smtp_port" placeholder="例如: 465 或 587">
                            </div>
                            <div class="form-group">
                                <label class="form-label">发件邮箱</label>
                                <input type="text" class="form-input" id="smtp_user" placeholder="your@email.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">授权码/密码</label>
                                <input type="password" class="form-input" id="smtp_pass" placeholder="SMTP 授权码或密码">
                            </div>
                            <div class="form-group">
                                <label class="form-label">验证码邮件模板</label>
                                <textarea class="form-textarea" id="email_template" rows="10" placeholder="输入邮件模板内容..."></textarea>
                                <div class="template-vars">
                                    可用变量：<code>{{code}}</code> 验证码 &nbsp; <code>{{site_name}}</code> 站点名 &nbsp; <code>{{expire_minutes}}</code> 有效期（分钟）
                                </div>
                            </div>
                            <div class="settings-actions">
                                <button class="btn btn-outline" style="padding: 0.6rem 1.2rem;" onclick="testEmail()">测试发送</button>
                                <button class="btn btn-primary" style="padding: 0.6rem 1.2rem;" onclick="saveSettings()">保存设置</button>
                            </div>
                        </div>
                    </div>
                    <div class="admin-card" style="margin-top: 1.5rem;">
                        <div class="settings-grid">
                            <div class="settings-section">
                                <h3 class="settings-section-title"><span><svg style="width:18px;height:18px;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span> 新消息通知</h3>
                                <div class="form-group">
                                    <label style="display:flex;align-items:center;gap:0.6rem;cursor:pointer;">
                                        <input type="checkbox" id="notifyEmail" style="width:18px;height:18px;accent-color:var(--accent-coral);">
                                        <span class="form-label" style="margin:0;">收到新消息时邮件通知我</span>
                                    </label>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">通知邮箱地址</label>
                                    <input type="email" class="form-input" id="notifyEmailAddress" placeholder="接收通知的邮箱地址">
                                </div>
                                <div class="settings-actions">
                                    <button class="btn btn-primary" style="padding: 0.6rem 1.2rem;" onclick="saveNotifySettings()">保存通知设置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: 账号安全 -->
                <div class="tab-content" id="tab-password">
                    <div class="admin-card">
                        <div class="settings-grid">
                            <div class="settings-section">
                                <h3 class="settings-section-title"><span><svg style="width:18px;height:18px;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span> 用户名</h3>
                                <div class="form-group">
                                    <label class="form-label">当前用户名</label>
                                    <input type="text" class="form-input" id="currentUsername" placeholder="当前用户名" disabled>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">新用户名</label>
                                    <input type="text" class="form-input" id="newUsername" placeholder="2-20 个字符">
                                </div>
                                <div class="settings-actions">
                                    <button class="btn btn-primary" style="padding: 0.6rem 1.2rem;" onclick="changeUsername()">修改用户名</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="admin-card" style="margin-top: 1.5rem;">
                        <div class="settings-grid">
                            <div class="settings-section">
                                <h3 class="settings-section-title"><span><svg style="width:18px;height:18px;vertical-align:middle;margin-right:8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span> 修改密码</h3>
                                <div class="form-group">
                                    <label class="form-label">当前密码</label>
                                    <input type="password" class="form-input" id="oldPassword" placeholder="请输入当前密码">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">新密码</label>
                                    <input type="password" class="form-input" id="newPassword" placeholder="至少 6 位">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">确认新密码</label>
                                    <input type="password" class="form-input" id="confirmPassword" placeholder="再次输入新密码">
                                </div>
                                <div class="settings-actions">
                                    <button class="btn btn-primary" style="padding: 0.6rem 1.2rem;" onclick="changePassword()">修改密码</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Avatar Crop Modal -->
    <div class="admin-modal-backdrop" id="cropModal">
        <div class="admin-modal" style="max-width: 520px;">
            <div class="admin-modal-header">
                <h3 class="admin-modal-title">裁剪头像</h3>
                <div class="admin-modal-close" onclick="closeCropModal()">&times;</div>
            </div>
            <div class="admin-modal-body">
                <div style="max-width: 400px; max-height: 400px; margin: 0 auto; background: #000; border-radius: 8px; overflow: hidden;">
                    <img id="cropImage" src="" alt="">
                </div>
                <div style="display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-4);">
                    <button class="btn btn-outline" onclick="closeCropModal()">取消</button>
                    <button class="btn btn-primary" onclick="confirmCrop()">确认裁剪</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1/dist/cropper.min.js"></script>
    <script src="/js/admin.js"></script>
    <script>
        checkAuth();

        // 当前激活的 Tab
        let currentTab = 'site';

        // Tab 切换
        function switchTab(tabName) {
            currentTab = tabName;

            // 切换按钮样式
            document.querySelectorAll('.tab-nav .btn').forEach(btn => {
                if (btn.dataset.tab === tabName) {
                    btn.classList.remove('btn-outline');
                    btn.classList.add('btn-primary');
                } else {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline');
                }
            });

            // 切换内容区显示
            document.querySelectorAll('.tab-content').forEach(section => {
                section.classList.remove('active');
            });
            const target = document.getElementById('tab-' + tabName);
            if (target) target.classList.add('active');
        }

        // 加载设置
        async function loadSettings() {
            try {
                const res = await fetch('/api/admin/settings', { headers: getAuthHeaders() });
                const data = await res.json();
                if (data.success) {
                    const s = data.data;

                    // 网站信息
                    document.getElementById('siteName').value = s.site_name || '';
                    document.getElementById('siteDesc').value = s.site_description || '';
                    const avatarEl = document.getElementById('authorAvatar');
                    if (s.author_avatar) {
                        avatarEl.value = s.author_avatar;
                        document.getElementById('avatarPreview').innerHTML = `<img src="${s.author_avatar}" style="width:100%;height:100%;object-fit:cover;">`;
                    }
                    document.getElementById('authorName').value = s.author_name || '';
                    document.getElementById('authorBio').value = s.author_bio || '';
                    document.getElementById('postsPerPage').value = s.posts_per_page || '10';
                    document.getElementById('footerText').value = s.footer_text || '';

                    // Favicon
                    if (s.site_favicon) {
                        document.getElementById('siteFavicon').value = s.site_favicon;
                        document.getElementById('faviconPreview').innerHTML = `<img src="${s.site_favicon}" style="width:100%;height:100%;object-fit:cover;">`;
                    }

                    // 备案信息
                    document.getElementById('icpText').value = s.icp_text || '';
                    document.getElementById('icpUrl').value = s.icp_url || '';

                    // 新消息通知
                    document.getElementById('notifyEmail').checked = s.notify_email === 'true';
                    document.getElementById('notifyEmailAddress').value = s.notify_email_address || '';

                    // 用户名
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    document.getElementById('currentUsername').value = user.username || s.author_name || '';

                    // 社交媒体链接
                    const socialKeys = ['social_github', 'social_bilibili', 'social_youtube', 'social_x', 'social_gitee', 'social_qq', 'social_email'];
                    socialKeys.forEach(key => {
                        const el = document.getElementById(key);
                        if (el) el.value = s[key] || '';
                    });

                    // SMTP 邮件配置
                    document.getElementById('smtp_host').value = s.smtp_host || '';
                    document.getElementById('smtp_port').value = s.smtp_port || '';
                    document.getElementById('smtp_user').value = s.smtp_user || '';
                    document.getElementById('smtp_pass').value = s.smtp_pass || '';
                    document.getElementById('email_template').value = s.email_template || '';
                }
            } catch (error) { console.error('加载设置失败:', error); }
        }

        // 保存设置（只保存当前激活 Tab 的设置）
        async function saveSettings() {
            let settings = {};

            if (currentTab === 'site') {
                settings = {
                    site_name: document.getElementById('siteName').value.trim(),
                    site_description: document.getElementById('siteDesc').value.trim(),
                    site_favicon: document.getElementById('siteFavicon').value.trim(),
                    author_avatar: document.getElementById('authorAvatar').value.trim(),
                    author_name: document.getElementById('authorName').value.trim(),
                    author_bio: document.getElementById('authorBio').value.trim(),
                    posts_per_page: document.getElementById('postsPerPage').value,
                    footer_text: document.getElementById('footerText').value.trim(),
                    icp_text: document.getElementById('icpText').value.trim(),
                    icp_url: document.getElementById('icpUrl').value.trim()
                };
            } else if (currentTab === 'social') {
                const socialKeys = ['social_github', 'social_bilibili', 'social_youtube', 'social_x', 'social_gitee', 'social_qq', 'social_email'];
                socialKeys.forEach(key => {
                    settings[key] = document.getElementById(key).value.trim();
                });
            } else if (currentTab === 'email') {
                settings = {
                    smtp_host: document.getElementById('smtp_host').value.trim(),
                    smtp_port: document.getElementById('smtp_port').value.trim(),
                    smtp_user: document.getElementById('smtp_user').value.trim(),
                    smtp_pass: document.getElementById('smtp_pass').value.trim(),
                    email_template: document.getElementById('email_template').value.trim()
                };
            } else if (currentTab === 'password') {
                changePassword();
                return;
            }

            try {
                const res = await fetch('/api/admin/settings', {
                    method: 'PUT',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(settings)
                });
                const data = await res.json();
                if (data.success) { showToast('设置已保存', 'success'); }
                else { showToast(data.message, 'error'); }
            } catch (error) { showToast('保存失败', 'error'); }
        }

        // 测试发送邮件
        async function testEmail() {
            const smtpUser = document.getElementById('smtp_user').value.trim();
            if (!smtpUser) {
                showToast('请先填写发件邮箱', 'error');
                return;
            }

            try {
                showToast('正在发送测试邮件...', 'info');
                const res = await fetch('/api/admin/settings/test-email', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ to: smtpUser })
                });
                const data = await res.json();
                if (data.success) { showToast('测试邮件已发送，请检查收件箱', 'success'); }
                else { showToast(data.message || '发送失败', 'error'); }
            } catch (error) { showToast('发送失败', 'error'); }
        }

        // 修改密码
        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!oldPassword || !newPassword) {
                showToast('请填写当前密码和新密码', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showToast('新密码至少 6 位', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('两次输入的新密码不一致', 'error');
                return;
            }

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('密码修改成功', 'success');
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) { showToast('修改失败', 'error'); }
        }

        // 上传头像
        let cropper = null;

        async function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }

            // 读取文件并打开裁剪器
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('cropImage').src = e.target.result;
                document.getElementById('cropModal').classList.add('open');

                // 初始化 Cropper.js
                setTimeout(() => {
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(document.getElementById('cropImage'), {
                        aspectRatio: 1,
                        viewMode: 1,
                        autoCropArea: 0.85,
                        responsive: true,
                        restore: false,
                        guides: true,
                        center: true,
                        highlight: true,
                        cropBoxMovable: true,
                        cropBoxResizable: true
                    });
                }, 100);
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function closeCropModal() {
            document.getElementById('cropModal').classList.remove('open');
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
        }

        async function confirmCrop() {
            if (!cropper) return;

            // 导出 512x512 JPEG
            const canvas = cropper.getCroppedCanvas({
                width: 512,
                height: 512,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high'
            });

            canvas.toBlob(async function(blob) {
                if (!blob) {
                    showToast('裁剪失败', 'error');
                    return;
                }

                const formData = new FormData();
                formData.append('image', blob, 'avatar.jpg');

                try {
                    const res = await fetch('/api/admin/media/upload', {
                        method: 'POST',
                        headers: getAuthHeaders(true),
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('authorAvatar').value = data.data.url;
                        document.getElementById('avatarPreview').innerHTML =
                            `<img src="${data.data.url}" style="width:100%;height:100%;object-fit:cover;">`;
                        showToast('头像上传成功', 'success');
                        closeCropModal();
                    } else {
                        showToast(data.message || '上传失败', 'error');
                    }
                } catch (error) {
                    showToast('上传失败', 'error');
                }
            }, 'image/jpeg', 0.9);
        }

        // 上传 Favicon
        async function uploadFavicon(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch('/api/admin/media/upload', {
                    method: 'POST',
                    headers: getAuthHeaders(true),
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('siteFavicon').value = data.data.url;
                    document.getElementById('faviconPreview').innerHTML = `<img src="${data.data.url}" style="width:100%;height:100%;object-fit:cover;">`;
                    showToast('图标上传成功', 'success');
                } else { showToast(data.message, 'error'); }
            } catch (error) { showToast('上传失败', 'error'); }
            event.target.value = '';
        }

        // 修改用户名
        async function changeUsername() {
            const newUsername = document.getElementById('newUsername').value.trim();
            if (!newUsername || newUsername.length < 2 || newUsername.length > 20) {
                showToast('用户名长度应在2-20个字符之间', 'error'); return;
            }
            try {
                const res = await fetch('/api/admin/username', {
                    method: 'PUT',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ username: newUsername })
                });
                const data = await res.json();
                if (data.success) {
                    // 更新 localStorage 中的用户信息
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    user.username = newUsername;
                    localStorage.setItem('user', JSON.stringify(user));
                    document.getElementById('currentUsername').value = newUsername;
                    document.getElementById('newUsername').value = '';
                    // 更新侧边栏用户名
                    const sidebarUser = document.getElementById('sidebarUsername');
                    if (sidebarUser) sidebarUser.textContent = newUsername;
                    showToast('用户名修改成功', 'success');
                } else { showToast(data.message || '修改失败', 'error'); }
            } catch (error) { showToast('修改失败', 'error'); }
        }

        // 保存通知设置
        async function saveNotifySettings() {
            const settings = {
                notify_email: document.getElementById('notifyEmail').checked ? 'true' : 'false',
                notify_email_address: document.getElementById('notifyEmailAddress').value.trim()
            };
            try {
                const res = await fetch('/api/admin/settings', {
                    method: 'PUT',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(settings)
                });
                const data = await res.json();
                if (data.success) { showToast('通知设置已保存', 'success'); }
                else { showToast(data.message || '保存失败', 'error'); }
            } catch (error) { showToast('保存失败', 'error'); }
        }

        loadSettings();
    </script>
</body>
</html>
