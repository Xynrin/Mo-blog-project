<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - 墨 · 创意博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed/rss">
    <link rel="alternate" type="application/atom+xml" title="Atom Feed" href="/feed/atom">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="icon" id="siteFavicon" href="">
    <style>
        .page-header { padding: 8rem 3rem 4rem; text-align: center; background: var(--bg-secondary); }
        .page-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; margin-bottom: 1rem; }
        .page-subtitle { color: var(--fg-secondary); font-size: 1rem; }
        .filter-bar { display: flex; justify-content: center; gap: 0.8rem; padding: 2rem 3rem; background: var(--bg-primary); flex-wrap: wrap; }
        .filter-btn { padding: 0.6rem 1.4rem; font-size: 0.8rem; letter-spacing: 0.05em; border: 1px solid var(--border-subtle); color: var(--fg-secondary); background: transparent; cursor: pointer; transition: var(--transition-smooth); }
        .filter-btn:hover, .filter-btn.active { background: var(--accent-coral); color: var(--bg-primary); border-color: var(--accent-coral); }
        .articles-section { padding: 4rem 3rem; background: var(--bg-secondary); min-height: 60vh; }
        .articles-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .article-card { background: var(--bg-card); border: 1px solid var(--border-subtle); overflow: hidden; transition: var(--transition-smooth); cursor: pointer; }
        .article-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); border-color: var(--border-accent); }
        .article-thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; }
        .article-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .article-card:hover .article-thumb img { transform: scale(1.05); }
        .article-thumb-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e, #16213e); }
        .article-category { position: absolute; top: 1rem; left: 1rem; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; background: var(--accent-coral); color: var(--bg-primary); padding: 0.3rem 0.8rem; font-weight: 700; }
        .article-body { padding: 1.5rem; }
        .article-meta { display: flex; align-items: center; gap: 0.8rem; font-size: 0.72rem; color: var(--fg-muted); margin-bottom: 0.8rem; }
        .article-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.8rem; transition: var(--transition-smooth); }
        .article-card:hover .article-title { color: var(--accent-coral); }
        .article-excerpt { font-size: 0.85rem; color: var(--fg-secondary); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; padding: 3rem; }
        .pagination-btn { padding: 0.5rem 1rem; font-size: 0.85rem; background: var(--bg-card); border: 1px solid var(--border-subtle); color: var(--fg-secondary); cursor: pointer; transition: var(--transition-fast); }
        .pagination-btn:hover:not(:disabled) { border-color: var(--accent-coral); color: var(--accent-coral); }
        .pagination-btn.active { background: var(--accent-coral); border-color: var(--accent-coral); color: var(--bg-primary); }
        .pagination-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty-state { text-align: center; padding: 4rem; color: var(--fg-muted); }
        @media (max-width: 768px) { .articles-list { grid-template-columns: 1fr; } .filter-bar { padding: 1.5rem; } }
    </style>
</head>
<body>
    <nav class="nav" id="navbar">
        <a href="/" class="nav-logo"><span class="dot"></span>墨</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/"><span class="nav-num">01</span>首页</a></li>
            <li><a href="/articles" class="active"><span class="nav-num">02</span>文章</a></li>
            <li><a href="/about"><span class="nav-num">03</span>关于我</a></li>
            <li><a href="/portfolio"><span class="nav-num">04</span>作品集</a></li>
            <li><a href="/contact"><span class="nav-num">05</span>联系我</a></li>
        </ul>
        <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">文章</h1>
        <p class="page-subtitle">探索设计、技术与生活的思考碎片</p>
    </header>

    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-category="">全部</button>
    </div>

    <section class="articles-section">
        <div class="articles-list" id="articlesList"></div>
    </section>

    <div class="pagination" id="pagination"></div>

    <footer class="footer">
        <span id="footerText">© 2026 墨 · Mo — 以文字记录灵感</span>
        <div id="icpInfo" style="display:none;">
            <a id="icpLink" class="footer-icp" href="#" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span id="icpText"></span>
            </a>
        </div>
        <div class="footer-links">
            <a href="/feed/rss" class="footer-rss" title="RSS订阅">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
                RSS
            </a>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        let currentPage = 1;
        let currentCategory = '';

        async function loadCategories() {
            const res = await fetch('/api/categories');
            const data = await res.json();
            if (data.success) {
                const container = document.getElementById('filterBar');
                data.data.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.dataset.category = cat.id;
                    btn.textContent = cat.name;
                    btn.onclick = () => filterByCategory(cat.id);
                    container.appendChild(btn);
                });
            }
        }

        async function loadArticles(page = 1) {
            currentPage = page;
            const params = new URLSearchParams({ page, limit: 9 });
            if (currentCategory) params.append('category', currentCategory);

            const res = await fetch(`/api/articles?${params}`);
            const data = await res.json();

            const container = document.getElementById('articlesList');
            if (data.success && data.data.articles.length > 0) {
                container.innerHTML = data.data.articles.map((article, index) => `
                    <article class="article-card reveal ${index > 0 ? 'reveal-delay-' + Math.min(index, 4) : ''}" onclick="window.location.href='/article/${article.slug}'">
                        <div class="article-thumb">
                            ${article.cover_image 
                                ? `<img src="${article.cover_image}" alt="">`
                                : '<div class="article-thumb-placeholder"></div>'
                            }
                            <span class="article-category" style="background: ${article.category_color || 'var(--accent-coral)'}">${article.category_name || '未分类'}</span>
                        </div>
                        <div class="article-body">
                            <div class="article-meta">
                                <span>${formatDate(article.published_at)}</span>
                                <span>·</span>
                                <span>${article.view_count || 0} 阅读</span>
                            </div>
                            <h3 class="article-title">${escapeHtml(article.title)}</h3>
                            <p class="article-excerpt">${escapeHtml(article.excerpt || '')}</p>
                            <div class="article-tags" style="margin-top:0.8rem">${(article.tags || []).map(tag => `<span class="tag" style="--tag-bg: ${article.category_color || 'var(--accent-coral)'}"><span>${escapeHtml(tag)}</span></span>`).join('')}</div>
                        </div>
                    </article>
                `).join('');
                renderPagination(data.data.pagination);
                initRevealAnimations();
                initCardTiltEffect();
            } else {
                container.innerHTML = '<div class="empty-state">暂无文章</div>';
                document.getElementById('pagination').innerHTML = '';
            }
        }

        function filterByCategory(categoryId) {
            currentCategory = categoryId;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category == categoryId);
            });
            loadArticles(1);
        }

        function renderPagination(pagination) {
            const { page, totalPages } = pagination;
            const container = document.getElementById('pagination');
            let html = `<button class="pagination-btn" onclick="loadArticles(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="pagination-btn ${i === page ? 'active' : ''}" onclick="loadArticles(${i})">${i}</button>`;
            }
            html += `<button class="pagination-btn" onclick="loadArticles(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;
            container.innerHTML = html;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 检查URL参数
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('category')) {
            currentCategory = urlParams.get('category');
        }

        loadCategories().then(() => {
            if (currentCategory) {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.category == currentCategory);
                });
            }
            loadArticles(1);
        });

        // Load footer settings
        fetch('/api/settings').then(r => r.json()).then(data => {
            if (!data.success) return;
            const s = data.data;
            if (s.site_favicon) {
                const favicon = document.getElementById('siteFavicon');
                if (favicon) favicon.href = s.site_favicon;
            }
            const ft = document.getElementById('footerText');
            if (ft && s.footer_text) ft.textContent = s.footer_text;
            if (s.icp_text) {
                const icpInfo = document.getElementById('icpInfo');
                const icpText = document.getElementById('icpText');
                const icpLink = document.getElementById('icpLink');
                if (icpInfo && icpText) {
                    icpText.textContent = s.icp_text;
                    if (s.icp_url && icpLink) icpLink.href = s.icp_url;
                    icpInfo.style.display = 'flex';
                }
            }
        }).catch(() => {});
    </script>
</body>
</html>
