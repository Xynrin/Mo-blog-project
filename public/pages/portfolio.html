<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集 - 墨 · 创意博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed/rss">
    <link rel="alternate" type="application/atom+xml" title="Atom Feed" href="/feed/atom">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="icon" id="siteFavicon" href="">
    <style>
        .page-header { padding: 8rem 3rem 4rem; text-align: center; background: var(--bg-secondary); }
        .page-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; margin-bottom: 1rem; }
        .page-subtitle { color: var(--fg-secondary); font-size: 1rem; }
        .portfolio-section { padding: 4rem 3rem; background: var(--bg-secondary); min-height: 60vh; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }

        /* 卡片 - 与文章卡片一致 */
        .portfolio-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            transition: var(--transition-smooth);
            cursor: pointer;
            position: relative;
        }
        .portfolio-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-accent);
        }

        /* 封面 */
        .portfolio-thumb {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }
        .portfolio-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .portfolio-card:hover .portfolio-thumb img {
            transform: scale(1.05);
        }
        .portfolio-thumb-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        /* 封面标签 */
        .portfolio-tag-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: var(--accent-gold);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            font-weight: 700;
        }

        /* 项目链接覆盖层 */
        .portfolio-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10,10,10,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition-smooth);
        }
        .portfolio-card:hover .portfolio-overlay {
            opacity: 1;
        }
        .portfolio-link {
            padding: 0.8rem 1.5rem;
            background: var(--accent-coral);
            color: var(--bg-primary);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition-fast);
        }
        .portfolio-link:hover {
            background: var(--accent-gold);
        }

        /* 内容区 */
        .portfolio-body { padding: 1.5rem; }
        .portfolio-meta {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.72rem;
            color: var(--fg-muted);
            margin-bottom: 0.8rem;
        }
        .portfolio-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.8rem;
            transition: var(--transition-smooth);
        }
        .portfolio-card:hover .portfolio-title {
            color: var(--accent-coral);
        }
        .portfolio-desc {
            font-size: 0.85rem;
            color: var(--fg-secondary);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 0.8rem;
        }
        .portfolio-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }

        .empty-state { text-align: center; padding: 4rem; color: var(--fg-muted); }

        @media (max-width: 768px) {
            .portfolio-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="nav" id="navbar">
        <a href="/" class="nav-logo"><span class="dot"></span>墨</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/"><span class="nav-num">01</span>首页</a></li>
            <li><a href="/articles"><span class="nav-num">02</span>文章</a></li>
            <li><a href="/about"><span class="nav-num">03</span>关于我</a></li>
            <li><a href="/portfolio" class="active"><span class="nav-num">04</span>作品集</a></li>
            <li><a href="/contact"><span class="nav-num">05</span>联系我</a></li>
        </ul>
        <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">作品集</h1>
        <p class="page-subtitle">精选项目与创作</p>
    </header>

    <section class="portfolio-section">
        <div class="portfolio-grid" id="portfolioGrid">
            <div class="empty-state">加载中...</div>
        </div>
    </section>

    <footer class="footer">
        <span id="footerText">© 2026 墨 · Mo — 以文字记录灵感</span>
        <div id="icpInfo" style="display:none;">
            <a id="icpLink" class="footer-icp" href="#" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span id="icpText"></span>
            </a>
        </div>
        <div class="footer-links">
            <a href="/feed/rss" class="footer-rss" title="RSS订阅">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
                RSS
            </a>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        async function loadPortfolios() {
            try {
                const res = await fetch('/api/portfolios');
                const data = await res.json();
                const container = document.getElementById('portfolioGrid');

                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map((item, index) => {
                        let tags = [];
                        try {
                            tags = JSON.parse(item.tags || '[]');
                            // 双重编码兜底
                            if (typeof tags === 'string') {
                                tags = JSON.parse(tags);
                            }
                        } catch(e) {}

                        const firstTag = tags.length > 0 ? tags[0] : '项目';

                        return `
                            <article class="portfolio-card reveal ${index > 0 ? 'reveal-delay-' + Math.min(index, 4) : ''}" ${item.project_url ? `onclick="window.open('${item.project_url}', '_blank')"` : ''}>
                                <div class="portfolio-thumb">
                                    ${item.cover_image
                                        ? `<img src="${item.cover_image}" alt="${escapeHtml(item.title)}">`
                                        : '<div class="portfolio-thumb-placeholder"></div>'
                                    }
                                    <span class="portfolio-tag-badge">${escapeHtml(firstTag)}</span>
                                    ${item.project_url ? `
                                        <div class="portfolio-overlay">
                                            <a href="${item.project_url}" target="_blank" class="portfolio-link" onclick="event.stopPropagation()">查看项目</a>
                                        </div>
                                    ` : ''}
                                </div>
                                <div class="portfolio-body">
                                    <div class="portfolio-meta">
                                        <span>${formatDate(item.created_at)}</span>
                                    </div>
                                    <h3 class="portfolio-title">${escapeHtml(item.title)}</h3>
                                    <p class="portfolio-desc">${escapeHtml(item.description || '暂无描述')}</p>
                                    ${tags.length > 0 ? `
                                        <div class="portfolio-tags">
                                            ${tags.map(t => `<span class="tag" style="--tag-bg: var(--accent-coral)"><span>${escapeHtml(t)}</span></span>`).join('')}
                                        </div>
                                    ` : ''}
                                </div>
                            </article>
                        `;
                    }).join('');

                    // 初始化动画
                    if (typeof initRevealAnimations === 'function') initRevealAnimations();
                    if (typeof initCardTiltEffect === 'function') initCardTiltEffect();
                } else {
                    container.innerHTML = '<div class="empty-state">暂无作品</div>';
                }
            } catch (error) {
                console.error('加载作品集失败:', error);
                document.getElementById('portfolioGrid').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }

        loadPortfolios();

        // Load footer settings
        fetch('/api/settings').then(r => r.json()).then(data => {
            if (!data.success) return;
            const s = data.data;
            if (s.site_favicon) {
                const favicon = document.getElementById('siteFavicon');
                if (favicon) favicon.href = s.site_favicon;
            }
            const ft = document.getElementById('footerText');
            if (ft && s.footer_text) ft.textContent = s.footer_text;
            if (s.icp_text) {
                const icpInfo = document.getElementById('icpInfo');
                const icpText = document.getElementById('icpText');
                const icpLink = document.getElementById('icpLink');
                if (icpInfo && icpText) {
                    icpText.textContent = s.icp_text;
                    if (s.icp_url && icpLink) icpLink.href = s.icp_url;
                    icpInfo.style.display = 'flex';
                }
            }
        }).catch(() => {});
    </script>
</body>
</html>
