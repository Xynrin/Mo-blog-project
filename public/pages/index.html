<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨 · 创意博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Noto+Serif+SC:wght@200;400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed/rss">
    <link rel="alternate" type="application/atom+xml" title="Atom Feed" href="/feed/atom">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="icon" id="siteFavicon" href="">
    <style>
        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 6rem 3rem 4rem;
            overflow: hidden;
        }
        .hero-bg { position: absolute; inset: 0; z-index: 0; }
        .hero-bg .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float-blob 20s ease-in-out infinite;
        }
        .hero-bg .blob:nth-child(1) { width: 600px; height: 600px; background: var(--accent-coral); top: -10%; right: -10%; }
        .hero-bg .blob:nth-child(2) { width: 400px; height: 400px; background: var(--accent-gold); bottom: -5%; left: -5%; animation-delay: -7s; }
        .hero-bg .blob:nth-child(3) { width: 300px; height: 300px; background: var(--accent-teal); top: 40%; left: 30%; animation-delay: -14s; }
        @keyframes float-blob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        .hero-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(240,236,226,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(240,236,226,0.03) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; max-width: 900px; text-align: center; }
        .hero-tag {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-coral);
            border: 1px solid var(--border-accent);
            padding: 0.4rem 1.2rem;
            margin-bottom: 2rem;
            animation: fade-up 0.8s ease-out 0.2s both;
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            animation: fade-up 0.8s ease-out 0.4s both;
        }
        .hero-title .line { display: block; }
        .hero-title .highlight {
            color: transparent;
            -webkit-text-stroke: 2px var(--accent-coral);
            position: relative;
        }
        .hero-subtitle {
            font-family: var(--font-accent);
            font-size: 1.2rem;
            color: var(--fg-secondary);
            max-width: 500px;
            margin: 0 auto 2.5rem;
            animation: fade-up 0.8s ease-out 0.6s both;
        }
        .hero-cta { display: flex; gap: 1rem; justify-content: center; animation: fade-up 0.8s ease-out 0.8s both; }
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            animation: fade-up 0.8s ease-out 1.2s both;
        }
        .scroll-indicator span { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fg-muted); }
        .scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--fg-muted), transparent); animation: scroll-pulse 2s ease-in-out infinite; }
        @keyframes scroll-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        /* Articles Grid */
        .articles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
        .article-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            transition: var(--transition-smooth);
            cursor: pointer;
        }
        .article-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); border-color: var(--border-accent); }
        .article-card:first-child { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; }
        .article-thumb { position: relative; overflow: hidden; aspect-ratio: 16/10; }
        .article-card:first-child .article-thumb { aspect-ratio: auto; height: 100%; }
        .article-thumb-bg { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .article-card:hover .article-thumb-bg { transform: scale(1.05); }
        .article-thumb-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,10,0.8), transparent 60%); }
        .article-category {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: var(--accent-coral);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            font-weight: 700;
        }
        .article-body { padding: 1.8rem; display: flex; flex-direction: column; justify-content: center; }
        .article-meta { display: flex; align-items: center; gap: 1rem; font-size: 0.72rem; color: var(--fg-muted); letter-spacing: 0.05em; margin-bottom: 0.8rem; }
        .article-meta .sep { width: 3px; height: 3px; background: var(--fg-muted); border-radius: 50%; }
        .article-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.8rem; transition: var(--transition-smooth); }
        .article-card:first-child .article-title { font-size: 1.8rem; }
        .article-card:hover .article-title { color: var(--accent-coral); }
        .article-excerpt { font-size: 0.85rem; color: var(--fg-secondary); line-height: 1.7; margin-bottom: 1.2rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .article-footer { display: flex; align-items: center; justify-content: space-between; }
        .article-tags { display: flex; gap: 0.5rem; }
        .article-tags span { font-size: 0.65rem; color: var(--fg-muted); border: 1px solid var(--border-subtle); padding: 0.2rem 0.6rem; }
        .article-read-more { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--accent-coral); display: flex; align-items: center; gap: 0.3rem; }
        .article-read-more .arrow { transition: transform 0.3s ease; }
        .article-card:hover .article-read-more .arrow { transform: translateX(4px); }

        /* Footer */
        .footer {
            padding: 3rem;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--fg-muted);
        }
        .footer-links { display: flex; gap: 2rem; }
        .footer-links a { color: var(--fg-muted); letter-spacing: 0.05em; }
        .footer-links a:hover { color: var(--accent-coral); }
        
        @media (max-width: 900px) {
            .articles-grid { grid-template-columns: 1fr; }
            .article-card:first-child { grid-column: 1; grid-template-columns: 1fr; }
            .article-card:first-child .article-thumb { aspect-ratio: 16/10; height: auto; }
            .footer { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav" id="navbar">
        <a href="/" class="nav-logo">
            <span class="dot"></span>
            墨
        </a>
        <ul class="nav-links" id="navLinks">
            <li><a href="/" class="active"><span class="nav-num">01</span>首页</a></li>
            <li><a href="/articles"><span class="nav-num">02</span>文章</a></li>
            <li><a href="/about"><span class="nav-num">03</span>关于我</a></li>
            <li><a href="/portfolio"><span class="nav-num">04</span>作品集</a></li>
            <li><a href="/contact"><span class="nav-num">05</span>联系我</a></li>
        </ul>
        <div class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-bg">
                        <canvas id="particles-canvas"></canvas>
            <div class="blob"></div>
            <div class="blob"></div>
            <div class="blob"></div>
        </div>
        <div class="hero-grid"></div>
        <div class="hero-content">
            <div class="hero-tag">✦ 创意 · 设计 · 生活</div>
            <h1 class="hero-title">
                <span class="line">以文字</span>
                <span class="line"><span class="highlight">记录灵感</span></span>
            </h1>
            <p class="hero-subtitle" id="siteDescription">在这里，我分享关于设计、技术与生活的思考碎片</p>
            <div class="hero-cta">
                <a href="/articles" class="btn btn-primary">浏览文章 <span class="arrow">→</span></a>
                <a href="/about" class="btn btn-outline">了解更多</a>
            </div>
        </div>
        <div class="scroll-indicator">
            <span>向下滚动</span>
            <div class="scroll-line"></div>
        </div>
    </section>


    <section class="section articles" id="articles">
        <div class="container">
            <div class="section-header reveal">
                <div>
                    <div class="section-label">Blog</div>
                    <h2 class="section-title">最新<span class="accent">文章</span></h2>
                </div>
                <a href="/articles" class="section-link">查看全部 <span>→</span></a>
            </div>
            <div class="articles-grid" id="articlesGrid">
                <!-- 动态加载 -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <span id="footerText">© 2026 墨 · Mo — 以文字记录灵感</span>
        <div class="social-links" id="socialLinks"></div>
        <div id="icpInfo" style="display:none;">
            <a id="icpLink" class="footer-icp" href="#" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span id="icpText"></span>
            </a>
        </div>
        <div class="footer-links">
            <a href="/feed/rss" class="footer-rss" title="RSS订阅">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
                RSS
            </a>
        </div>
    </footer>

    <script src="/js/particles.js"></script>
    <script src="/js/main.js"></script>
    <script>
        // 加载网站设置
        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                if (data.success) {
                    const settings = data.data;

                    if (settings.site_description) {
                        document.getElementById('siteDescription').textContent = settings.site_description;
                    }
                    if (settings.site_name) {
                        document.title = settings.site_name;
                    }
                    if (settings.site_favicon) {
                        const favicon = document.getElementById('siteFavicon');
                        if (favicon) favicon.href = settings.site_favicon;
                    }
                    if (settings.footer_text) {
                        document.getElementById('footerText').textContent = settings.footer_text;
                    }
                    if (settings.icp_text) {
                        const icpInfo = document.getElementById('icpInfo');
                        const icpText = document.getElementById('icpText');
                        const icpLink = document.getElementById('icpLink');
                        if (icpInfo && icpText) {
                            icpText.textContent = settings.icp_text;
                            if (settings.icp_url && icpLink) icpLink.href = settings.icp_url;
                            icpInfo.style.display = 'flex';
                        }
                    }
                }

                    // 加载社交链接
                    const socialRes = await fetch('/api/settings');
                    const socialData = await socialRes.json();
                    const socials = socialData.data;
                    const socialPlatforms = [
                        { key: 'social_github', label: 'GitHub', icon: '<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>' },
                        { key: 'social_bilibili', label: 'Bilibili', icon: '<path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/>' },
                        { key: 'social_youtube', label: 'YouTube', icon: '<path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.43z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/>' },
                        { key: 'social_x', label: 'X', icon: '<path d="M4 4l11.733 16h4.267l-11.733 -16h-4.267z"/><path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"/>' },
                        { key: 'social_gitee', label: 'Gitee', icon: '<circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/>' },
                        { key: 'social_qq', label: 'QQ', icon: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
                        { key: 'social_email', label: 'Email', icon: '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>' }
                    ];
                    const linksHtml = socialPlatforms.filter(p => socials[p.key]).map(p =>
                        `<a href="${socials[p.key]}" target="_blank" rel="noopener" class="social-link" title="${p.label}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.icon}</svg>
                        </a>`
                    ).join('');
                    const socialEl = document.getElementById('socialLinks');
                    if (socialEl) socialEl.innerHTML = linksHtml;
            } catch (error) {
                console.error('加载设置失败:', error);
            }
        }

        // 加载文章列表
        async function loadArticles() {
            try {
                const res = await fetch('/api/articles?limit=5');
                const data = await res.json();
                if (data.success) {
                    const container = document.getElementById('articlesGrid');
                    const articles = data.data.articles;
                    
                    if (articles.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: var(--fg-muted); grid-column: 1/-1;">暂无文章</p>';
                        return;
                    }
                    
                    container.innerHTML = articles.map((article, index) => `
                        <article class="article-card reveal ${index > 0 ? 'reveal-delay-' + Math.min(index, 4) : ''}" onclick="window.location.href='/article/${article.slug}'">
                            <div class="article-thumb">
                                ${article.cover_image 
                                    ? `<img src="${article.cover_image}" class="article-thumb-bg" alt="">`
                                    : `<div class="article-thumb-bg" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);"></div>`
                                }
                                <div class="article-thumb-overlay"></div>
                                <span class="article-category" style="background: ${article.category_color || 'var(--accent-coral)'}">${article.category_name || '未分类'}</span>
                            </div>
                            <div class="article-body">
                                <div class="article-meta">
                                    <span>${formatDate(article.published_at)}</span>
                                    <span class="sep"></span>
                                    <span>阅读 ${Math.ceil((article.excerpt || '').length / 200) || 5} 分钟</span>
                                </div>
                                <h3 class="article-title">${escapeHtml(article.title)}</h3>
                                <p class="article-excerpt">${escapeHtml(article.excerpt || '')}</p>
                                <div class="article-footer">
                                    <div class="article-tags">${(article.tags || []).map(tag => `<span class="tag" style="--tag-bg: ${article.category_color || 'var(--accent-coral)'}"><span>${escapeHtml(tag)}</span></span>`).join('')}</div>
                                    <span class="article-read-more">阅读全文 <span class="arrow">→</span></span>
                                </div>
                            </div>
                        </article>
                    `).join('');
                    
                    // 重新初始化滚动动画和卡片倾斜效果
                    initRevealAnimations();
                    initCardTiltEffect();
                }
            } catch (error) {
                console.error('加载文章失败:', error);
            }
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        loadSettings();
        loadArticles();
    </script>
</body>
</html>
